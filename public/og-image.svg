<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="#020617"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Decorative Background Glows -->
  <circle cx="200" cy="100" r="300" fill="rgba(99, 102, 241, 0.08)" filter="url(#glow)"/>
  <circle cx="1000" cy="530" r="300" fill="rgba(236, 72, 153, 0.08)" filter="url(#glow)"/>
  
  <!-- Main Content Container -->
  <g transform="translate(600, 315)">
    <!-- Name -->
    <text x="0" y="-20" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="96" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-2">
      Kyle Semple
    </text>
    
    <!-- Subtitle/Role -->
    <text x="0" y="60" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="36" font-weight="500" fill="#94a3b8" text-anchor="middle" letter-spacing="4" text-transform="uppercase">
      AI Operations &amp; Customer Success
    </text>

    <!-- Tagline/Pill -->
    <g transform="translate(-120, 120)">
        <rect width="240" height="48" rx="24" fill="rgba(99, 102, 241, 0.15)" stroke="rgba(99, 102, 241, 0.3)" />
        <text x="120" y="32" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#818cf8" text-anchor="middle" letter-spacing="2">
            PREMIUM PORTFOLIO
        </text>
    </g>
  </g>
</svg>