name: CI

on:
  push:
    branches: [main, 'claude/**', 'chore/**']
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      # Pinned to full SHA to prevent tag-repointing supply chain attacks.
      # Verify or update these SHAs at: https://github.com/actions/checkout/tags
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        # Verify or update at: https://github.com/actions/setup-node/tags
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build

      - name: Key Audit
        run: |
          if grep -r "GEMINI_API_KEY" dist/; then
            echo "ERROR: GEMINI_API_KEY found in bundle"
            exit 1
          fi
