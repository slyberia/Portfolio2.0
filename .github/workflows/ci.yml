name: CI

on:
  push:
    branches: [main, 'claude/**', 'chore/**']
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      # Pinned to full SHA to prevent tag-repointing supply chain attacks.
      # Verify or update these SHAs at: https://github.com/actions/checkout/tags
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node.js
        # Verify or update at: https://github.com/actions/setup-node/tags
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build

      - name: Generate crawler snapshots
        run: npm run generate:crawler-html

      - name: Validate crawler output
        run: npm run validate:crawler

      - name: Secret scan (gitleaks)
        # Pinned to full SHA to prevent tag-repointing supply chain attacks.
        # Verify or update at: https://github.com/gitleaks/gitleaks-action/tags
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Key Audit
        run: |
          if grep -r "GEMINI_API_KEY" dist/; then
            echo "ERROR: GEMINI_API_KEY found in bundle"
            exit 1
          fi
